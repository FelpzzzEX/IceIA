services:
  ollama:
    container_name: IceIA-Ollama
    build:
      context: .
      dockerfile: Dockerfile.ollama
    ports:
      - "11434:11434"

  qdrant:
    container_name: IceIA-Qdrant
    image: qdrant/qdrant:v1.17
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  redis:
    container_name: IceIA-Redis
    image: redis:8.6
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes